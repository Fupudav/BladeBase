name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Build Firebase runtime config
        run: |
          cat > firebase-config.js <<'EOF'
          export const firebaseConfig = {
            apiKey: "${{ secrets.FIREBASE_API_KEY }}",
            authDomain: "${{ vars.FIREBASE_AUTH_DOMAIN }}",
            projectId: "${{ vars.FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ vars.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ vars.FIREBASE_MESSAGING_SENDER_ID }}",
            appId: "${{ vars.FIREBASE_APP_ID }}",
            measurementId: "${{ vars.FIREBASE_MEASUREMENT_ID }}"
          };
          EOF
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
